name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint / Type / Test / Security
    runs-on: ubuntu-latest

    env:
      # Sync ONCE explicitly below (with --extra cpu, --locked); UV_NO_SYNC then keeps
      # every `uv run` step on that exact, lock-verified env. Without it, a plain
      # `uv run` on Linux re-resolves torch WITHOUT the cpu extra and pulls the heavy
      # PyPI CUDA wheel. CI MUST stay on +cpu and MUST NEVER select --extra cu130
      # (the cu130 wheel segfaults on a GPU-less box). See docs/specs/torch-backend-per-machine.md.
      UV_NO_SYNC: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        # --extra cpu → the lean +cpu torch wheel from the pytorch-cpu index (never cu130).
        # --locked → fail if uv.lock is stale vs pyproject (no silent re-resolve in CI).
        run: uv sync --locked --extra cpu --extra dev

      # --- Lint ---
      - name: Ruff lint
        run: uv run ruff check src/ tests/

      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

      # --- Types ---
      - name: mypy
        run: uv run mypy src/

      # --- Tests (unit only — no API calls, no cost) ---
      - name: pytest with coverage
        run: uv run pytest tests/unit/ tests/integration/ --cov=src --cov-report=term-missing --cov-fail-under=40 --ignore=tests/eval/

      # --- Security ---
      - name: bandit SAST
        run: uv run bandit -r src/ -c pyproject.toml

      - name: pip-audit (advisory)
        continue-on-error: true
        run: uv run pip-audit

      - name: detect-secrets
        run: uv run detect-secrets scan --baseline .secrets.baseline
