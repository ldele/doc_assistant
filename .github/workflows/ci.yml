name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint / Type / Test / Security
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      # --- Lint ---
      - name: Ruff lint
        run: uv run ruff check src/ tests/

      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

      # --- Types ---
      - name: mypy
        run: uv run mypy src/

      # --- Tests (unit only — no API calls, no cost) ---
      - name: pytest with coverage
        run: uv run pytest tests/unit/ tests/integration/ --cov=src --cov-report=term-missing --cov-fail-under=45 --ignore=tests/eval/

      # --- Security ---
      - name: bandit SAST
        run: uv run bandit -r src/ -c pyproject.toml

      - name: pip-audit
        run: uv run pip-audit

      - name: detect-secrets
        run: uv run detect-secrets scan --baseline .secrets.baseline
