[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "doc-assistant"
version = "0.2.0"
requires-python = ">=3.10"
readme = "README.md"
license = {text = "MIT"}
authors = [
    {name = "ldele"}
]
keywords = ["rag", "llm", "document-search", "local-first"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: End Users/Desktop",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Text Processing :: Indexing",
]

dependencies = [
    "python-dotenv>=1.0.0",

    # LangChain stack (1.x)
    "langchain>=1.0,<2.0",
    "langchain-core>=1.0,<2.0",
    "langchain-classic>=1.0,<2.0",
    "langchain-community>=0.4,<1.0",
    "langchain-text-splitters>=1.0,<2.0",
    "langchain-chroma>=1.0,<2.0",
    "langchain-huggingface>=1.0,<2.0",
    "langchain-anthropic>=1.0,<2.0",
    "langchain-ollama>=1.0,<2.0",

    # Vector store + embeddings
    "chromadb>=0.5",
    "sentence-transformers>=3.0",

    # Document processing
    "pymupdf4llm>=0.0.17",
    "pymupdf>=1.24",
    "ebooklib>=0.18",
    "beautifulsoup4>=4.12",
    "lxml>=5.0",
    "python-docx>=1.0",
    "rank_bm25>=0.2.2",

    # UI
    "chainlit>=2.0,<3.0",

    # Utilities
    "tqdm>=4.66",

    # Database
    "sqlalchemy>=2.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
]

[project.scripts]
doc-cli = "apps.cli:main"
doc-ingest = "doc_assistant.ingest:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]