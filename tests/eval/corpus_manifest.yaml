# Public corpus manifest — the literature behind doc_assistant
#
# A self-referential demo corpus: the papers whose methods this project implements
# (RAG, dense retrieval, sentence embeddings, the BGE + SPECTER2 embedders, BERT
# re-ranking, ColBERT, HyDE, LLM-as-a-judge, AI Usage Cards). It powers the
# clone-and-run public eval (tests/eval/cases.public.yaml).
#
# DOWNLOAD-ONLY. Every paper is on arXiv. scripts/download_corpus.py fetches each
# pinned-version PDF straight from arXiv. Nothing is re-hosted in this repo, so the
# arXiv non-exclusive license is not an issue — you reference and download, not
# redistribute. sha256 pins the exact bytes used when the cases were authored;
# arXiv occasionally re-renders a PDF, so a mismatch is a warning, not an error.
#
# This is NOT the project's benchmark corpus. The 35-case neuroscience benchmark
# (cases.yaml) runs on the user's private library, which is mostly copyrighted and
# not redistributable. That benchmark is unchanged; this corpus is a separate,
# fully-shareable demonstration set.

